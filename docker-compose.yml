# ══════════════════════════════════════════════════════════════════════════════
# CRM Laravel — Docker Compose
#
# Services:
#   db          — MariaDB 11 (auto-imports crm_db_portal.sql on first start)
#   app         — PHP 8.2-FPM (Laravel application)
#   nginx       — Web server on port 8000 (0.0.0.0 — accessible from any network IP)
#   phpmyadmin  — Database GUI on port 8080 (auto-login as root)
#
# ── Quick start ───────────────────────────────────────────────────────────────
#   cp .env.docker .env          # one-time: configure credentials
#   docker compose up --build -d
#   open http://<your-LAN-ip>:8000
#
# ── First-time login ──────────────────────────────────────────────────────────
#   Email:    admin@crm.local
#   Password: Admin@1234!
#
# The SQL dump (crm_db_portal.sql) is auto-imported by MariaDB on the very
# first run (when db_data volume is empty).  If you prefer a fresh database
# with only demo data, set SEED_DATABASE=true and leave the SQL file absent.
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── MariaDB ─────────────────────────────────────────────────────────────────
  db:
    image: mariadb:11
    container_name: crm_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD:    "${DB_ROOT_PASSWORD:-admin@123}"
      MYSQL_DATABASE:         "${DB_DATABASE:-crm_db_portal}"
      MYSQL_USER:             "${DB_USERNAME:-crm_user}"
      MYSQL_PASSWORD:         "${DB_PASSWORD:-admin@123}"
      MARIADB_CHARACTER_SET:  utf8mb4
      MARIADB_COLLATION:      utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
      # SQL dump auto-imported on first start (only when db_data volume is empty)
      - ./crm_db_portal.sql:/docker-entrypoint-initdb.d/01-crm-init.sql:ro
      # Grant ALL PRIVILEGES to crm_user after SQL import
      - ./docker/mariadb/02-grants.sql:/docker-entrypoint-initdb.d/02-grants.sql:ro
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/crm.cnf:ro
    ports:
      # Expose MariaDB to the HOST for GUI tools (TablePlus, DBeaver, etc.)
      # Remove in production.
      - "${DB_PORT_EXTERNAL:-3307}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s      # give MariaDB time to import the SQL dump
    networks:
      - crm_net

  # ── PHP-FPM application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      # Enable BuildKit inline cache so layers are reused across machines
      # when using a registry cache (e.g. docker build --cache-from).
      args:
        BUILDKIT_INLINE_CACHE: "1"
    image: crm-laravel-app:latest
    container_name: crm_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      # ── Application ──────────────────────────────────────────────────────────
      APP_NAME:               "${APP_NAME:-CRM Portal}"
      APP_ENV:                "${APP_ENV:-local}"
      APP_KEY:                "${APP_KEY:-}"
      APP_DEBUG:              "${APP_DEBUG:-true}"
      # APP_URL must match how users reach the app.
      # Use your server's LAN IP or hostname for network access:
      #   APP_URL=http://192.168.1.50:8000
      # Default 'localhost' works for local-machine access only.
      APP_URL:                "${APP_URL:-http://localhost:8000}"
      APP_TIMEZONE:           "Europe/London"

      # ── Trusted proxies ───────────────────────────────────────────────────────
      # '*' trusts all proxies — fine for isolated Docker deployments.
      # Restrict to specific CIDR in production (e.g. "172.16.0.0/12").
      TRUSTED_PROXIES:        "${TRUSTED_PROXIES:-*}"

      # ── Database ─────────────────────────────────────────────────────────────
      DB_CONNECTION:          mysql
      DB_HOST:                db
      DB_PORT:                3306
      DB_DATABASE:            "${DB_DATABASE:-crm_db_portal}"
      DB_USERNAME:            "${DB_USERNAME:-crm_user}"
      DB_PASSWORD:            "${DB_PASSWORD:-admin@123}"

      # ── Cache / Session / Queue ───────────────────────────────────────────────
      CACHE_STORE:            database
      SESSION_DRIVER:         database
      SESSION_LIFETIME:       120
      QUEUE_CONNECTION:       database

      # ── Mail ─────────────────────────────────────────────────────────────────
      MAIL_MAILER:            "${MAIL_MAILER:-log}"
      MAIL_HOST:              "${MAIL_HOST:-smtp.gmail.com}"
      MAIL_PORT:              "${MAIL_PORT:-587}"
      MAIL_USERNAME:          "${MAIL_USERNAME:-}"
      MAIL_PASSWORD:          "${MAIL_PASSWORD:-}"
      MAIL_ENCRYPTION:        "${MAIL_ENCRYPTION:-tls}"
      MAIL_FROM_ADDRESS:      "${MAIL_FROM_ADDRESS:-noreply@localhost}"
      MAIL_FROM_NAME:         "${APP_NAME:-CRM Portal}"

      # ── IP restriction ───────────────────────────────────────────────────────
      # SKIP_IP_CHECK=true lets anyone log in (useful during initial VPS setup).
      # Set to false once you have added your IPs via the admin panel.
      SKIP_IP_CHECK:            "${SKIP_IP_CHECK:-true}"

      # ── Seeding ──────────────────────────────────────────────────────────────
      # Set to "true" to run php artisan db:seed on first start.
      # Automatically disabled after first run (a .seeded marker file is created).
      # Set to "force" to always re-seed on every startup (DESTRUCTIVE in prod).
      SEED_DATABASE:          "${SEED_DATABASE:-auto}"

      # ── Logging ──────────────────────────────────────────────────────────────
      LOG_CHANNEL:            stack
      LOG_LEVEL:              "${LOG_LEVEL:-debug}"
    volumes:
      # User uploads & generated files — persisted across image rebuilds
      - storage_data:/var/www/html/storage/app
      # Application logs
      - logs_data:/var/www/html/storage/logs
      # Vite-compiled CSS/JS — shared with Nginx so it can serve them as static files
      # The entrypoint syncs public_build_src/ → this volume on every startup
      - public_build:/var/www/html/public/build
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crm_net

  # ── phpMyAdmin ───────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: crm_phpmyadmin
    restart: unless-stopped
    ports:
      # Access phpMyAdmin at http://<server-ip>:8080
      - "0.0.0.0:${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST:             db
      PMA_PORT:             3306
      MYSQL_ROOT_PASSWORD:  "${DB_ROOT_PASSWORD:-admin@123}"
      # Allow logging in as root or any DB user
      PMA_ARBITRARY:        0
      # Pre-fill the server field so you just enter username/password
      PMA_USER:             root
      PMA_PASSWORD:         "${DB_ROOT_PASSWORD:-admin@123}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crm_net

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      # Bind to 0.0.0.0 (all interfaces) so the CRM is reachable from any
      # device on the same LAN — open http://<server-LAN-ip>:8000
      - "0.0.0.0:${APP_PORT:-8000}:80"
    volumes:
      # Host public dir provides index.php, favicon, robots.txt, etc.
      - ./public:/var/www/html/public:ro
      # Named volume overlays public/build with Vite-compiled assets from the app image
      # (populated by the app container's entrypoint on every startup)
      - public_build:/var/www/html/public/build:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - crm_net

networks:
  crm_net:
    driver: bridge

volumes:
  db_data:
    driver: local
  storage_data:
    driver: local
  logs_data:
    driver: local
  public_build:
    driver: local

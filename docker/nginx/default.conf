# ──────────────────────────────────────────────────────────────────────────────
# Nginx — CRM Laravel
# Listens on port 80; proxies PHP to php-fpm (app:9000).
#
# Real-IP: When running behind Docker on Linux the real client IP is already
# in $remote_addr (iptables DNAT preserves source IP).  On Docker Desktop
# (Windows/Mac) the extra VM NAT layer can mask it — the set_real_ip_from
# directives below handle that by reading X-Forwarded-For from upstream
# load balancers / reverse proxies placed in front of this Nginx.
# ──────────────────────────────────────────────────────────────────────────────

# Trust private-network ranges so X-Forwarded-For is honoured
# (covers Docker bridge 172.x, load-balancers in 10.x/192.168.x).
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
set_real_ip_from 127.0.0.1;
real_ip_header    X-Forwarded-For;
real_ip_recursive on;

server {
    listen 80;
    server_name _;

    root  /var/www/html/public;
    index index.php index.html;

    # Max upload size (match PHP ini)
    client_max_body_size 100M;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Laravel front-controller ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP via PHP-FPM ─────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files             $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass           app:9000;
        fastcgi_index          index.php;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME  $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO        $fastcgi_path_info;
        # Pass real client IP so $request->ip() in Laravel sees it correctly
        fastcgi_param REMOTE_ADDR      $remote_addr;
        fastcgi_param HTTP_X_REAL_IP   $remote_addr;

        fastcgi_read_timeout 300;
        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;
    }

    # ── Block hidden files ──────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Long-lived cache for compiled frontend assets ───────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml font/woff2;

    error_log  /var/log/nginx/crm_error.log  warn;
    access_log /var/log/nginx/crm_access.log combined;
}
